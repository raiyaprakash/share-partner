  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&display=swap');
      body {
        font-family: 'Mukta', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 10px;
        background: #f0f4f8;
      }

      .login-box {
        background: white;
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      label {
        display: block;
        margin-bottom: 15px;
        text-align: left;
        font-weight: 500;
        color: #444;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 1rem;
      }
* {
    -moz-box-sizing: border-box;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
}
      button {
        background: #0070f3;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        margin-top: 20px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s ease-in-out;
      }

      button:hover {
        background: #005ad1;
      }

      @media (max-width: 480px) {
        .login-box {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>🔐 Share Partner Login</h2>
      <form method="POST" action="/do-login">
        <label>
          Share ID:
          <input name="referid" placeholder="Enter Share ID" required />
        </label>
        <label>
          Password:
          <input name="password" type="password" placeholder="Enter password" required />
        </label>
        <button type="submit">🔓 Login</button>
      </form>
    </div>
</body>
  </html>
