<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <link href="/favicon.ico" rel="icon" type="image/x-icon"/>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&display=swap');

    body{
      font-family: 'Mukta', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-lg shadow-md border border-slate-200 p-5 sm:p-6">

    <!-- Title -->
    <div class="text-center mb-6">
      <div class="w-14 h-14 mx-auto rounded-full bg-blue-100 flex items-center justify-center mb-3">
        <i data-lucide="shield-check" class="w-7 h-7 text-blue-600"></i>
      </div>

      <h2 class="text-2xl font-bold text-slate-800">
        Share Partner Login
      </h2>

      <p class="text-sm text-slate-500 mt-1">
        Login to access your dashboard
      </p>
    </div>

    <!-- Form -->
    <form method="POST" action="/do-login" class="space-y-4">

      <!-- Share ID -->
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1.5 block">
          Share ID
        </label>

        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <i data-lucide="user-round" class="w-4 h-4"></i>
          </span>

          <input type="text" name="referid" placeholder="Enter Share ID" required class="w-full h-11 pl-10 pr-3 rounded-md border border-slate-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" />
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1.5 block">
          Password
        </label>

        <div class="relative">

          <!-- Left Icon -->
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <i data-lucide="lock-keyhole" class="w-4 h-4"></i>
          </span>

          <!-- Input -->
          <input id="password" type="password" name="password" placeholder="Enter Password" required class="w-full h-11 pl-10 pr-11 rounded-md border border-slate-300 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" />

          <!-- Show Hide Button -->
          <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700" ><i id="eyeIcon" data-lucide="eye" class="w-4 h-4"></i></button>

        </div>
      </div>

      <!-- Button -->
      <button type="submit" class="w-full h-11 rounded-md bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2" ><i data-lucide="log-in" class="w-4 h-4"></i> Login </button>

    </form>

  </div>

  <script>
    lucide.createIcons();

    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    let visible = false;

    togglePassword.addEventListener("click", () => {
      visible = !visible;

      passwordInput.type = visible ? "text" : "password";

      togglePassword.innerHTML = visible
        ? '<i data-lucide="eye-off" class="w-4 h-4"></i>'
        : '<i data-lucide="eye" class="w-4 h-4"></i>';

      lucide.createIcons();
    });
  </script>

</body>
</html>
