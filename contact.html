<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Contact Us</title>

<link rel="icon" type="image/x-icon" href="/favicon.ico"/>

<!-- TailwindCSS + Lucide -->
<script src="https://cdn.jsdelivr.net/combine/npm/@tailwindcss/browser@4.2.2/dist/index.global.min.js,npm/lucide@1.7.0/dist/umd/lucide.min.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family: "Mukta", sans-serif;
}
</style>
</head>

<body class="bg-slate-100 text-slate-700">

<!-- Header -->
<div class="sticky top-0 z-50 bg-white border-b border-slate-200">

    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">

        <!-- Back Button -->
        <button
            onclick="history.back()"
            class="w-9 h-9 rounded-md border border-slate-200 flex items-center justify-center hover:bg-slate-100 transition"
        >
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </button>

        <div>
            <h1 class="text-base md:text-lg font-bold text-slate-800">
                Contact Us
            </h1>

            <p class="text-[11px] md:text-xs text-slate-500">
                We'd love to hear from you
            </p>
        </div>

    </div>

</div>

<!-- Main -->
<div class="max-w-3xl mx-auto p-3 md:p-6">

    <!-- Main Card -->
    <div class="bg-white border border-slate-200 rounded-md shadow-sm overflow-hidden">

        <!-- Hero -->
        <div class="bg-gradient-to-r from-blue-600 to-cyan-500 px-4 py-7 md:px-6 md:py-8 text-center text-white">

            <div class="w-14 h-14 md:w-16 md:h-16 rounded-full bg-white/20 mx-auto flex items-center justify-center mb-4">
                <i data-lucide="headphones" class="w-7 h-7 md:w-8 md:h-8"></i>
            </div>

            <h2 class="text-xl md:text-3xl font-extrabold">
                Get In Touch
            </h2>

            <p class="mt-2 text-[13px] md:text-base text-blue-50">
                Contact us for any questions, support, or business inquiries.
            </p>

        </div>

        <!-- Content -->
        <div class="p-4 md:p-6 space-y-4">

            <!-- Address -->
            <div class="bg-slate-50 border border-slate-200 rounded-md p-4">

                <div class="flex items-start gap-3">

                    <div class="w-10 h-10 md:w-11 md:h-11 rounded-md bg-blue-100 flex items-center justify-center shrink-0">
                        <i data-lucide="map-pin" class="w-4 h-4 md:w-5 md:h-5 text-blue-600"></i>
                    </div>

                    <div class="min-w-0">

                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-1">
                            Office Address
                        </h3>

                        <p class="text-[13px] md:text-[15px] text-slate-600 leading-6">
                            Village Nagla Durji, Hathras,<br>
                            Uttar Pradesh, 204101
                        </p>

                    </div>

                </div>

            </div>

            <!-- Phone -->
            <div class="bg-slate-50 border border-slate-200 rounded-md p-4">

                <div class="flex items-start gap-3">

                    <div class="w-10 h-10 md:w-11 md:h-11 rounded-md bg-green-100 flex items-center justify-center shrink-0">
                        <i data-lucide="phone-call" class="w-4 h-4 md:w-5 md:h-5 text-green-600"></i>
                    </div>

                    <div class="min-w-0">

                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-1">
                            Phone
                        </h3>

                        <a
                            href="tel:+917017161590"
                            class="text-[13px] md:text-[15px] text-blue-600 hover:underline"
                        >
                            +91 70171 61590
                        </a>

                    </div>

                </div>

            </div>

            <!-- Email -->
            <div class="bg-slate-50 border border-slate-200 rounded-md p-4">

                <div class="flex items-start gap-3">

                    <div class="w-10 h-10 md:w-11 md:h-11 rounded-md bg-red-100 flex items-center justify-center shrink-0">
                        <i data-lucide="mail" class="w-4 h-4 md:w-5 md:h-5 text-red-500"></i>
                    </div>

                    <div class="min-w-0">

                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-1">
                            Email
                        </h3>

                        <a
                            href="mailto:prakashraiya25@autopush.in"
                            class="text-[13px] md:text-[15px] text-blue-600 hover:underline break-all"
                        >
                            prakashraiya25@autopush.in
                        </a>

                    </div>

                </div>

            </div>

            <!-- Contact Person -->
            <div class="bg-slate-50 border border-slate-200 rounded-md p-4">

                <div class="flex items-start gap-3">

                    <div class="w-10 h-10 md:w-11 md:h-11 rounded-md bg-purple-100 flex items-center justify-center shrink-0">
                        <i data-lucide="user-round" class="w-4 h-4 md:w-5 md:h-5 text-purple-600"></i>
                    </div>

                    <div class="min-w-0">

                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-1">
                            Contact Person
                        </h3>

                        <p class="text-[13px] md:text-[15px] text-slate-600">
                            Prakash Raiya
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
