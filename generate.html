<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Generate Refer Link</title>

<script src='https://cdn.jsdelivr.net/combine//npm/@tailwindcss/browser@4.2.2/dist/index.global.min.js,npm/lucide@1.7.0/dist/umd/lucide.min.js'></script>
<link href='/favicon.ico' rel='icon' type='image/x-icon'/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<style>
*{
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow-x:hidden;
}

textarea::-webkit-scrollbar{
    width:6px;
}

textarea::-webkit-scrollbar-thumb{
    background:#3b82f6;
    border-radius:20px;
}
</style>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<!-- Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">

    <div class="absolute top-0 left-0 w-48 h-48 md:w-72 md:h-72 bg-blue-500/20 blur-3xl rounded-full"></div>

    <div class="absolute bottom-0 right-0 w-48 h-48 md:w-72 md:h-72 bg-purple-500/20 blur-3xl rounded-full"></div>

</div>

<!-- Main -->
<div class="relative z-10 max-w-5xl mx-auto p-2 sm:p-3 md:p-8">

    <!-- Card -->
    <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-800 rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="p-3 sm:p-4 md:p-8 border-b border-slate-800">

            <div class="flex items-center gap-3 md:gap-4">

                <!-- Icon -->
                <div class="w-11 h-11 md:w-14 md:h-14 rounded-xl md:rounded-2xl bg-gradient-to-r from-blue-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-blue-500/20">

                    <i data-lucide="link-2" class="w-5 h-5 md:w-7 md:h-7"></i>

                </div>

                <!-- Title -->
                <div>

                    <h1 class="text-lg sm:text-xl md:text-3xl font-extrabold leading-tight">
                        Generate & Earn Money
                    </h1>

                    <p class="text-slate-400 mt-0.5 text-xs sm:text-sm md:text-base">
                        Generate referral links instantly
                    </p>

                </div>

            </div>

        </div>

        <!-- Body -->
        <div class="p-3 sm:p-4 md:p-8">

            <!-- Textarea -->
            <div class="relative">

                <textarea
                    id="smessage"
                    spellcheck="false"
                    placeholder="Enter text or URLs here..."
                    class="w-full h-[220px] sm:h-[260px] md:h-[380px] rounded-xl md:rounded-2xl bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none p-3 sm:p-4 md:p-5 text-[12px] sm:text-[13px] md:text-[15px] resize-none transition-all duration-300"
                ></textarea>

                <div class="absolute bottom-3 right-3 text-[10px] sm:text-xs text-slate-500">
                    Multi-line Supported
                </div>

            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-3 mt-4 md:mt-6">

                <!-- Paste -->
                <button
                    onclick="paste()"
                    class="flex items-center justify-center gap-1.5 sm:gap-2 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-xl py-2.5 sm:py-3 md:py-4 text-[12px] sm:text-sm md:text-base font-semibold"
                >

                    <i data-lucide="clipboard-paste" class="w-4 h-4 md:w-5 md:h-5"></i>

                    Paste

                </button>

                <!-- Generate -->
                <button
                    onclick="gernatescript()"
                    class="flex items-center justify-center gap-1.5 sm:gap-2 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-xl py-2.5 sm:py-3 md:py-4 text-[12px] sm:text-sm md:text-base font-semibold shadow-lg shadow-blue-500/20"
                >

                    <i data-lucide="sparkles" class="w-4 h-4 md:w-5 md:h-5"></i>

                    Generate

                </button>

                <!-- Copy -->
                <button
                    onclick="gernatescriptcopy()"
                    class="flex items-center justify-center gap-1.5 sm:gap-2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-all rounded-xl py-2.5 sm:py-3 md:py-4 text-[12px] sm:text-sm md:text-base font-semibold shadow-lg shadow-emerald-500/20"
                >

                    <i data-lucide="copy" class="w-4 h-4 md:w-5 md:h-5"></i>

                    Copy

                </button>

                <!-- Clear -->
                <button
                    onclick="generate_bold_clear()"
                    class="flex items-center justify-center gap-1.5 sm:gap-2 bg-red-600 hover:bg-red-500 active:scale-95 transition-all rounded-xl py-2.5 sm:py-3 md:py-4 text-[12px] sm:text-sm md:text-base font-semibold shadow-lg shadow-red-500/20"
                >

                    <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>

                    Clear

                </button>

            </div>

            <!-- Radio -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-4 mt-4 md:mt-6">

                <!-- UnBold -->
                <label class="cursor-pointer">

                    <input type="radio" id="unbold" name="select" class="hidden peer">

                    <div class="rounded-xl border border-slate-800 bg-slate-900 py-2.5 sm:py-3 px-3 sm:px-4 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 transition-all flex items-center justify-between">

                        <div>
                            <div class="font-semibold text-sm md:text-base">
                                Un Bold
                            </div>

                            <div class="text-[11px] sm:text-xs text-slate-400">
                                Plain format
                            </div>
                        </div>

                        <i data-lucide="type" class="w-4 h-4 md:w-5 md:h-5 text-slate-400"></i>

                    </div>

                </label>

                <!-- Bold -->
                <label class="cursor-pointer">

                    <input type="radio" id="boldchange" name="select" checked class="hidden peer">

                    <div class="rounded-xl border border-slate-800 bg-slate-900 py-2.5 sm:py-3 px-3 sm:px-4 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 transition-all flex items-center justify-between">

                        <div>
                            <div class="font-semibold text-sm md:text-base">
                                Bold
                            </div>

                            <div class="text-[11px] sm:text-xs text-slate-400">
                                *Text*
                            </div>
                        </div>

                        <i data-lucide="bold" class="w-4 h-4 md:w-5 md:h-5 text-slate-400"></i>

                    </div>

                </label>

                <!-- Telegram -->
                <label class="cursor-pointer">

                    <input type="radio" id="boldtelegram" name="select" class="hidden peer">

                    <div class="rounded-xl border border-slate-800 bg-slate-900 py-2.5 sm:py-3 px-3 sm:px-4 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 transition-all flex items-center justify-between">

                        <div>
                            <div class="font-semibold text-sm md:text-base">
                                T-Bold
                            </div>

                            <div class="text-[11px] sm:text-xs text-slate-400">
                                **Text**
                            </div>
                        </div>

                        <i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5 text-slate-400"></i>

                    </div>

                </label>

            </div>

        </div>

    </div>

</div>

<!-- Toast -->
<div
    id="toast"
    class="fixed bottom-5 left-1/2 -translate-x-1/2 hidden z-50"
>

    <div class="bg-slate-900 border border-slate-700 px-4 py-2.5 rounded-xl shadow-2xl flex items-center gap-2">

        <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>

        <span id="toastText" class="font-medium text-xs sm:text-sm"></span>

    </div>

</div>

<!--button onclick="goBack()"
    class="fixed bottom-6 left-6 z-50 w-14 h-14 rounded-full bg-orange-600 hover:bg-orange-500 shadow-2xl shadow-orange-500/30 flex items-center justify-center transition-all duration-300 active:scale-90">
    <i data-lucide="arrow-left" class="w-6 h-6 text-white"></i>
</button-->
    
<!-- Fixed Back Button -->
<button
  onclick="history.back()"
  class="fixed bottom-4 left-4 z-50 bg-white border border-slate-200 shadow-sm hover:shadow-md rounded px-3 py-2 flex items-center gap-2 text-slate-700 hover:bg-slate-50 transition-all duration-200"
>
  <i data-lucide="arrow-left" class="w-4 h-4"></i>
  <span class="text-sm font-medium">Back</span>
</button>
<script>

document.addEventListener("DOMContentLoaded", function(){

    const referId = localStorage.getItem("refer_id");

    if(!referId){
        window.location.href="/login";
    }

});

function showToast(message){

    const toast=document.getElementById("toast");

    const toastText=document.getElementById("toastText");

    toastText.innerText=message;

    toast.classList.remove("hidden");

    setTimeout(()=>{
        toast.classList.add("hidden");
    },2000);
}

function gernatescript(){

    const textarea=document.getElementById("smessage");

    if(!textarea.value.trim()){

        showToast("Please enter text first");

        return;
    }

    const referId=localStorage.getItem("refer_id") || "2";

    const lines=textarea.value.split("\n");

    const domains=[
        "aksolution.in",
        "fastrojgar.com",
        "fastrojgar.in",
        "sarkarigroup.com",
        "sarkarigroup.in",
        "sarkarimaster.com"
    ];

    const result=lines.map(line=>{

        let text=line.replace(/\*/g,'').trim();

        if(!text) return "";

        if(domains.some(domain=>text.includes(domain))){

            text=text.replace(/(\.html)[?#].*/, "$1");

            text=text.replace(/(\.html)$/, "$1");

            text=text.replace(/[?#].*$/, "");

            text += "?m=1#shr-" + referId;
        }

        if(document.getElementById("boldchange").checked){

            return '*' + text + '*';
        }

        else if(document.getElementById("boldtelegram").checked){

            return '**' + text + '**';
        }

        else{

            return text;
        }

    });

    textarea.value=result.join("\n");

    showToast("Generated Successfully");
}

function paste(){

    navigator.clipboard.readText().then(cliptext=>{

        document.getElementById("smessage").value=cliptext;

        setTimeout(gernatescript,100);

        setTimeout(gernatescriptcopy,200);

    }).catch(()=>{

        showToast("Clipboard access denied");

    });
}

function gernatescriptcopy(){

    const textarea=document.getElementById("smessage");

    textarea.select();

    document.execCommand("copy");

    showToast("Copied Successfully");
}

function generate_bold_clear(){

    document.getElementById("smessage").value='';

    showToast("Cleared");
}

lucide.createIcons();
    
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
