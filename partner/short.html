<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Inter", sans-serif;
    }
    .card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }
    .btn-primary {
      background: linear-gradient(90deg, #007bff, #0062cc);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(90deg, #0069d9, #0056b3);
    }
    .result {
      background: #e9f7ef;
      border: 1px solid #c3e6cb;
      padding: 12px;
      border-radius: 8px;
      word-break: break-all;
    }
    .copy-btn {
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card p-4 col-lg-5 col-md-7 mx-auto">
    <h3 class="text-center mb-4">🔗 URL Shortener</h3>

    <div class="mb-3">
      <label for="urlInput" class="form-label">Enter your URL</label>
      <input type="url" class="form-control" id="urlInput" placeholder="https://example.com" required>
    </div>

    <div class="mb-3" id="userIdContainer">
      <label for="userIdInput" class="form-label">Your User ID</label>
      <input type="text" class="form-control" id="userIdInput" placeholder="Enter your User ID" required>
    </div>

    <button id="shortenBtn" class="btn btn-primary w-100 mb-3">Shorten URL</button>

    <div id="result" class="result d-none text-center"></div>
    <button id="copyBtn" class="btn btn-outline-success w-100 mt-2 copy-btn d-none">📋 Copy Link</button>
    <div id="error" class="text-danger text-center mt-3"></div>
  </div>
</div>

<script>
const allowedDomains = ["aksolution.in", "fastrojgar", "sarkarimasaster.com"];

// --- Helper Functions ---
function isValidUrl(url) {
  try { new URL(url); return true; } catch { return false; }
}

function isAllowedDomain(url) {
  try {
    const hostname = new URL(url).hostname;
    return allowedDomains.some(domain => hostname.includes(domain));
  } catch {
    return false;
  }
}

// --- Get ?ref=user-id from URL ---
const params = new URLSearchParams(window.location.search);
const refUserId = params.get("ref");

// If ?ref is present, hide user input and prefill userId
if (refUserId) {
  const userIdContainer = document.getElementById("userIdContainer");
  const userIdInput = document.getElementById("userIdInput");
  userIdInput.value = refUserId;
  userIdContainer.style.display = "none";
}

document.getElementById("shortenBtn").addEventListener("click", async () => {
  const url = document.getElementById("urlInput").value.trim();
  const userId = document.getElementById("userIdInput").value.trim();
  const resultDiv = document.getElementById("result");
  const copyBtn = document.getElementById("copyBtn");
  const errorDiv = document.getElementById("error");

  resultDiv.classList.add("d-none");
  copyBtn.classList.add("d-none");
  errorDiv.textContent = "";

  if (!url || !userId) {
    errorDiv.textContent = "⚠️ Please enter both URL and User ID.";
    return;
  }

  if (!isValidUrl(url)) {
    errorDiv.textContent = "❌ Please enter a valid URL (starting with http or https).";
    return;
  }

  if (!isAllowedDomain(url)) {
    errorDiv.textContent = "🚫 This domain is not allowed.";
    return;
  }

  try {
    const res = await fetch('/api-shorten', {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, userId })
    });

    const data = await res.json();

    if (!res.ok) {
      errorDiv.textContent = data.error || "Something went wrong.";
      return;
    }

    const shortUrlWithRef = `${data.shortUrl}?ref=${encodeURIComponent(userId)}`;
    resultDiv.innerHTML = `✅ Short URL: <a href="${shortUrlWithRef}" target="_blank">${shortUrlWithRef}</a>`;
    resultDiv.classList.remove("d-none");
    copyBtn.classList.remove("d-none");

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(shortUrlWithRef);
      copyBtn.textContent = "✅ Copied!";
      setTimeout(() => (copyBtn.textContent = "📋 Copy Link"), 2000);
    };
  } catch (err) {
    errorDiv.textContent = "❌ Network error. Please check your Worker URL.";
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
